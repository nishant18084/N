<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant official | Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid #2a2a2a;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #e1306c; /* Instagram pink/red theme */
            object-fit: cover;
            box-shadow: 0 0 15px rgba(225, 48, 108, 0.4);
        }

        h1 {
            font-size: 22px;
            color: #ffffff;
            margin: 15px 0 5px 0;
            font-weight: 600;
        }

        .username {
            color: #888888;
            font-size: 14px;
            margin-bottom: 20px;
            display: block;
        }

        .bio {
            color: #cccccc;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            background: #262626;
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #3a3a3a;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Special Styling for Instagram Button */
        .instagram-btn {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border: none;
        }

        .instagram-btn:hover {
            background: linear-gradient(45deg, #bc1888 0%, #cc2366 25%, #dc2743 50%, #e6683c 75%, #f09433 100%);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/150" alt="Nishant official" class="profile-img">
        
        <h1>Nishant official</h1>
        <span class="username">@nishant_vlogs_1</span>
        
        <p class="bio">Welcome to my official page! 🎬 Support me by following my journey below.</p>

        <div class="links-container">
            <a href="https://instagram.com/nishant_vlogs_1" target="_blank" class="link-btn instagram-btn">Follow Me on Instagram</a>
            
            <a href="#" class="link-btn">My YouTube Channel</a>
            <a href="#" class="link-btn">Join My Discord</a>
        </div>
    </div>

</body>
</html>
